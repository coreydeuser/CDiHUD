<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="LM HUD">
<meta name="mobile-web-app-capable" content="yes">
<title>Late Model HUD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --acc-tint:#2a0404;--acc-tint2:#3a0404;--acc-dim:#160303;--acc-ghost:#0f0202;
  --acc-faint:rgba(204,17,17,.1);--acc-faint2:rgba(180,20,20,.5);
  --bg:#080808;--p1:#131313;--p2:#1c1c1c;--bd:#2a2a2a;
  --acc:#cc1111;--accH:#ff2a2a;--txt:#eeeeee;--dim:#606060;
  --grn:#1fa84a;--inp:#0d0d0d;--btn:#1e1e1e;
  --ih:36px;--wh:26px;--r:5px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'Montserrat','Segoe UI',Arial,sans-serif;font-size:1rem;overflow:hidden}
input,textarea,button,select{font-family:inherit}

/* SHELL */
#shell{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}

/* TOPBAR */
#topbar{background:#0a0a0a;border-bottom:2px solid var(--acc);padding:0 10px;
  display:flex;align-items:center;gap:4px;flex-shrink:0;min-height:54px;
  overflow-x:auto;scrollbar-width:none}
#topbar::-webkit-scrollbar{display:none}
#logo-area{display:flex;align-items:center;gap:7px;cursor:pointer;flex-shrink:0;min-width:70px}
#logo-area:active{opacity:.7}
#logo-img{height:38px;object-fit:contain;display:none;border-radius:4px}
#logo-text{font-size:1.08rem;font-weight:900;color:var(--acc);letter-spacing:3px;text-transform:uppercase;white-space:nowrap}
#logo-hint{font-size:0.62rem;color:var(--dim);white-space:nowrap;letter-spacing:.5px;text-transform:uppercase}
.vsep{width:1px;background:var(--bd);height:22px;flex-shrink:0;margin:0 3px}
.gap{flex:1;min-width:3px}
.tb{background:var(--btn);border:1px solid var(--bd);color:#ccc;border-radius:4px;
  padding:4px 9px;font-size:0.85rem;font-weight:600;cursor:pointer;touch-action:manipulation;
  min-height:30px;white-space:nowrap;flex-shrink:0;letter-spacing:.3px;transition:border-color .15s,color .15s}
.tb:hover{border-color:#444;color:var(--txt)}
.tb:active{background:#252525;color:var(--txt)}
.tb.red{background:var(--acc);color:#fff;border-color:var(--acc);font-weight:700;letter-spacing:.5px}
.tb.red:hover{background:var(--accH);border-color:var(--accH)}
.tb.red:active{background:var(--accH)}
.ebadge{background:var(--accH);color:#fff;font-size:0.69rem;font-weight:800;
  padding:2px 7px;border-radius:3px;letter-spacing:1.5px;text-transform:uppercase;display:none;flex-shrink:0;
  animation:blink 1s ease-in-out infinite alternate}
@keyframes blink{from{opacity:1}to{opacity:.4}}
/* CLOCK AREA */
#clock-area{display:flex;flex-direction:row;align-items:center;justify-content:center;
  flex-shrink:0;padding:0 12px;gap:8px;cursor:default}
#live-clock{font-size:1.31rem;font-weight:800;color:var(--txt);letter-spacing:1.5px;line-height:1;white-space:nowrap}
#clock-sep{font-size:1.31rem;font-weight:300;color:var(--bd);line-height:1;flex-shrink:0}
#countdown-display{font-size:1.31rem;font-weight:800;color:var(--grn);cursor:pointer;
  white-space:nowrap;letter-spacing:1px;line-height:1}
#countdown-display.cdwarn{color:#f0c040}
#countdown-display.cdurgent{color:#ff4444}

/* SETTINGS PANEL */
#settings-panel{background:#0d0d0d;border-bottom:2px solid var(--acc);
  max-height:0;overflow:hidden;transition:max-height .25s ease,border-color .25s;flex-shrink:0}
#settings-panel.open{max-height:220px}
#sp-inner{padding:8px 12px 10px}
#sp-tabs{display:flex;gap:4px;margin-bottom:9px;border-bottom:1px solid var(--bd);padding-bottom:7px;flex-wrap:wrap}
.sp-tab{background:none;border:none;color:var(--dim);font-size:0.85rem;font-weight:700;
  padding:3px 10px;cursor:pointer;border-radius:4px;touch-action:manipulation;
  font-family:inherit;letter-spacing:.5px;text-transform:uppercase;transition:all .15s}
.sp-tab:hover{color:var(--txt);background:rgba(255,255,255,.05)}
.sp-tab.active{color:var(--acc);background:var(--acc-faint);border-bottom:2px solid var(--acc)}
.sp-pane{animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.sp-row{display:flex;align-items:center}
#settings-tab-btn.active-panel{color:var(--acc);border-color:var(--acc);background:var(--acc-faint)}

/* SESSION STRIP */
#sess-strip{background:#060606;border-bottom:1px solid var(--bd);display:flex;
  align-items:stretch;overflow-x:auto;overflow-y:hidden;flex-shrink:0;
  min-height:44px;max-height:44px;scrollbar-width:none}
#sess-strip::-webkit-scrollbar{display:none}
#scards{display:flex;align-items:stretch;flex-shrink:0}
.scard{display:flex;flex-direction:column;justify-content:center;padding:3px 10px 3px 9px;
  border-right:1px solid var(--bd);min-width:120px;cursor:pointer;position:relative;
  touch-action:manipulation;flex-shrink:0;border-bottom:2px solid transparent}
.scard.active{background:var(--acc-ghost);border-bottom-color:var(--acc)}
.scard:active{background:var(--acc-dim)}
.sn{font-size:0.54rem;font-weight:700;color:var(--dim);letter-spacing:.8px;text-transform:uppercase;padding-right:18px}
.scard.active .sn{color:var(--acc)}
.sm{font-size:0.85rem;font-weight:800;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;padding-right:18px;letter-spacing:.3px}
.scard.active .sm{color:#fff}
.sl2{font-size:0.54rem;color:var(--dim);margin-top:1px;letter-spacing:.3px}
.sge{position:absolute;top:3px;right:3px;background:none;border:none;color:var(--dim);
  font-size:0.85rem;cursor:pointer;padding:2px 3px;touch-action:manipulation;line-height:1}
.sge:active{color:var(--acc)}
.sdel{position:absolute;bottom:3px;right:3px;background:none;border:none;color:var(--dim);
  font-size:0.77rem;cursor:pointer;padding:1px 3px;touch-action:manipulation;line-height:1}
.sdel:active{color:var(--acc)!important}
.sadd{display:flex;align-items:center;justify-content:center;padding:0 14px;
  color:var(--grn);font-size:1.38rem;min-width:40px;cursor:pointer;
  touch-action:manipulation;flex-shrink:0;border-right:1px solid var(--bd);font-weight:700}
.sadd:active{background:#081408}

/* RUN STRIP */
#strip{background:#040404;border-bottom:1px solid var(--bd);display:flex;
  align-items:stretch;overflow-x:auto;overflow-y:hidden;flex-shrink:0;
  min-height:50px;max-height:50px;scrollbar-width:none}
#strip::-webkit-scrollbar{display:none}
#rcards{display:flex;align-items:stretch;flex-shrink:0}
.rcard{display:flex;flex-direction:column;justify-content:center;padding:4px 11px;
  border-right:1px solid var(--bd);min-width:90px;cursor:pointer;position:relative;
  touch-action:manipulation;flex-shrink:0;border-bottom:2px solid transparent}
.rcard.active{background:var(--acc-ghost);border-bottom-color:var(--acc)}
.rcard:active{background:var(--acc-dim)}
.rn{font-size:0.62rem;font-weight:700;color:var(--dim);letter-spacing:1px;text-transform:uppercase}
.rcard.active .rn{color:var(--acc)}
.rt{font-size:1rem;font-weight:800;letter-spacing:.3px;line-height:1.2}
.rcard.active .rt{color:#fff}
.rl{font-size:0.62rem;color:var(--dim);margin-top:1px}
.rdel{position:absolute;top:2px;right:2px;background:none;border:none;color:var(--dim);
  font-size:0.85rem;cursor:pointer;padding:1px 3px;touch-action:manipulation;line-height:1}
.rdel:active{color:var(--acc)!important}
.radd{display:flex;align-items:center;justify-content:center;padding:0 12px;
  color:var(--grn);font-size:1.31rem;min-width:36px;cursor:pointer;
  touch-action:manipulation;flex-shrink:0;border-right:1px solid var(--bd);font-weight:700}
.radd:active{background:#081408}

/* DASHBOARD */
#dash{flex:1;position:relative;overflow:hidden;background:var(--bg)}

/* WIDGET */
.widget{position:absolute;background:var(--p1);border:1px solid #1e1e1e;
  border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;
  min-width:140px;min-height:80px;z-index:10}
.edit-on .widget{border-color:var(--acc-faint2)}
.widget.dragging{opacity:.82;z-index:500!important}

/* Widget header */
.wh{background:#111;border-bottom:1px solid var(--bd);height:var(--wh);
  display:flex;align-items:center;gap:3px;padding:0 6px;flex-shrink:0;
  user-select:none;-webkit-user-select:none}
.wt{font-size:0.69rem;font-weight:800;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#888;text-transform:uppercase;letter-spacing:.8px}
.wbtn{display:none;background:none;border:none;color:var(--dim);font-size:0.92rem;cursor:pointer;
  padding:1px 3px;line-height:1;touch-action:manipulation;border-radius:3px;min-height:20px;align-items:center;justify-content:center}
.wbtn:hover{color:var(--txt);background:rgba(255,255,255,.07)}
.wbtn:active{color:var(--acc)}
.edit-on .wh{cursor:grab}
.edit-on .wh:active{cursor:grabbing}
.edit-on .wbtn{display:flex}

/* Widget body */
.wb{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px;scrollbar-width:thin;scrollbar-color:var(--bd) transparent;display:flex;flex-direction:column;min-height:0}
.wb::-webkit-scrollbar{width:3px}
.wb::-webkit-scrollbar-thumb{background:var(--bd)}
/* Notes widget: canvas fills body height */
.wb-notes{overflow:hidden;padding:5px}

/* Resize handle */
.wr{position:absolute;bottom:0;right:0;width:18px;height:18px;cursor:se-resize;display:none;touch-action:none;z-index:20}
.wr::after{content:'';position:absolute;bottom:3px;right:3px;width:8px;height:8px;border-right:2px solid var(--acc);border-bottom:2px solid var(--acc)}
.edit-on .widget .wr{display:block}

/* Ghost */
#ghost{position:absolute;background:var(--acc-faint);border:2px dashed var(--acc);border-radius:var(--r);pointer-events:none;display:none;z-index:490}

/* FIELDS */
.field{display:flex;flex-direction:column;gap:1px}
.field label,.flbl{font-size:0.62rem;font-weight:800;color:var(--dim);letter-spacing:.5px;text-transform:uppercase}
.field input[type=text],.field input[type=date],.field input[type=number],.field textarea{
  background:var(--inp);border:1px solid var(--bd);color:var(--txt);
  border-radius:4px;padding:3px 5px;font-size:0.92rem;width:100%;
  min-height:var(--ih);outline:none;-webkit-appearance:none}
.field input:focus,.field textarea:focus{border-color:var(--acc);background:var(--acc-dim)}
.field textarea{resize:vertical;min-height:50px;font-size:0.85rem;line-height:1.4}

/* STEPPER */
.sp{display:flex;align-items:stretch;border:1px solid var(--bd);border-radius:4px;overflow:hidden;background:var(--inp)}
.sp input[type=number]{flex:1;border:none;border-left:1px solid var(--bd);border-right:1px solid var(--bd);
  border-radius:0;text-align:center;min-height:var(--ih);font-size:1rem;font-weight:700;
  background:var(--inp);color:var(--txt);-moz-appearance:textfield;width:0;outline:none}
.sp input:focus{background:var(--acc-dim);border-color:var(--acc)}
.sp input::-webkit-inner-spin-button,.sp input::-webkit-outer-spin-button{-webkit-appearance:none}
.spb{background:var(--acc-tint);border:none;color:var(--acc);font-size:1.31rem;font-weight:700;line-height:1;
  min-width:var(--ih);min-height:var(--ih);display:flex;align-items:center;justify-content:center;
  cursor:pointer;touch-action:manipulation;user-select:none;-webkit-user-select:none;flex-shrink:0}
.spb:active{background:var(--acc);color:#fff}
/* XS stepper for tire temps */
.sp.xs .spb{min-width:26px;min-height:26px;font-size:1.08rem}
.sp.xs input[type=number]{min-height:26px;font-size:0.77rem;font-weight:700}

/* FRACTION STEPPER */
.fsp{display:flex;align-items:stretch;border:1px solid var(--bd);border-radius:4px;overflow:hidden;background:var(--inp)}
.fsp-disp{flex:1;text-align:center;min-height:var(--ih);font-size:1.08rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;background:var(--inp);color:var(--txt);
  border-left:1px solid var(--bd);border-right:1px solid var(--bd)}

/* TIRE 2x2 GRID */
.t2x2{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.tc{background:var(--p2);border:1px solid var(--bd);border-radius:4px;padding:4px 5px}
.tc .cl{font-size:0.77rem;font-weight:800;color:var(--acc);margin-bottom:3px;letter-spacing:1px}
/* Compact tire temp layout */
.tt-row{display:flex;gap:3px}
.tt-cell{flex:1;min-width:0}
.tt-lbl{font-size:0.54rem;font-weight:800;color:var(--dim);text-align:center;text-transform:uppercase;letter-spacing:.3px;margin-bottom:1px}

/* BUILDS DISPLAY */
.builds-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.build-cell{background:var(--p2);border:1px solid var(--bd);border-radius:4px;padding:4px 6px;text-align:center}
.build-lbl{font-size:0.62rem;font-weight:800;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.build-val{font-size:1.08rem;font-weight:900;margin-top:2px}
.build-val.pos{color:var(--grn)}
.build-val.neg{color:var(--acc)}
.build-val.zero{color:var(--dim)}

/* STAGGER CALC */
.stag-calc{background:var(--p2);border:1px solid var(--bd);border-radius:4px;padding:6px;margin-top:6px}
.stag-row{display:flex;justify-content:space-around}
.stag-item{text-align:center}
.stag-item .sl{font-size:0.62rem;font-weight:800;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.stag-item .sv{font-size:1.15rem;font-weight:900;color:var(--accH);margin-top:2px}

/* TEMP ITEM */
.temp-item{margin-bottom:5px}
.temp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.temp-item .tname{font-size:0.69rem;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.temp-item .tremove{background:none;border:none;color:var(--acc);cursor:pointer;font-size:0.92rem;padding:0 2px;touch-action:manipulation;line-height:1}

/* LAP TIME LIST */
.lap-row{display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid var(--bd)}
.lap-row:last-child{border-bottom:none}
.lap-num{font-size:0.69rem;color:var(--dim);min-width:20px;font-weight:700}
.lap-time{font-size:1.08rem;font-weight:700;flex:1;color:var(--txt)}
.lap-time.fastest{color:var(--acc)}
.lap-del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:1rem;padding:0 3px;touch-action:manipulation}
.lap-del:active{color:var(--acc)}
.lap-add-row{display:flex;gap:5px;margin-top:7px}
.lap-inp{background:var(--inp);border:1px solid var(--bd);color:var(--txt);border-radius:4px;
  padding:5px 8px;font-size:1.08rem;flex:1;outline:none;min-height:var(--ih)}
.lap-inp:focus{border-color:var(--acc)}

/* NOTES TABS */
.notes-toolbar{display:flex;align-items:center;gap:4px;margin-bottom:5px;flex-wrap:wrap}
.notes-lbl-btn{background:var(--btn);color:var(--dim);border:1px solid var(--bd);border-radius:4px;
  padding:3px 10px;font-size:0.77rem;font-weight:700;cursor:pointer;touch-action:manipulation;letter-spacing:.5px;transition:all .15s}
.notes-lbl-btn.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.notes-lbl-btn:active{opacity:.8}

/* CROSS MEMBER DISPLAY */
.xmem-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}

/* SECTION LABEL */
.sec{font-size:0.62rem;font-weight:800;color:var(--dim);text-transform:uppercase;letter-spacing:1px;
  margin-bottom:4px;padding-bottom:2px;border-bottom:1px solid var(--bd)}
.sec.nb{border-bottom:none;padding-bottom:0;margin-bottom:3px}

/* GRID HELPERS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
.mb{margin-bottom:5px}

/* CALC DISPLAY */
.calc-row{display:flex;gap:5px;margin-top:3px}
.calc-cell{flex:1;background:var(--p2);border:1px solid var(--bd);border-radius:4px;padding:3px 5px;text-align:center}
.calc-cell .cl{font-size:0.62rem;color:var(--dim);font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.calc-cell .cv{font-size:1rem;font-weight:900;color:var(--accH)}

/* MODALS */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:600;
  align-items:center;justify-content:center;padding:12px}
.modal.open{display:flex}
.mbox{background:var(--p1);border:1px solid var(--acc);border-radius:10px;
  padding:16px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.mbox.wide{max-width:600px}
.mt{font-size:1rem;font-weight:800;color:var(--acc);margin-bottom:11px;letter-spacing:1px}
.msub{font-size:0.77rem;font-weight:800;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin:10px 0 6px}
.pi{background:var(--inp);border:1px solid var(--bd);border-radius:5px;
  padding:8px 11px;margin-bottom:5px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.pi:active{background:var(--acc-dim);border-color:var(--acc)}
.pn{font-size:0.92rem;font-weight:600}
.pbg{font-size:0.77rem;color:var(--grn);font-weight:700}
.pi.off .pbg{color:var(--dim)}
.mi{background:var(--inp);border:1px solid var(--bd);color:var(--txt);border-radius:5px;
  padding:6px 10px;font-size:0.92rem;width:100%;margin-bottom:6px;outline:none}
.mi:focus{border-color:var(--acc)}
select.mi{cursor:pointer}
.mhr{border:none;border-top:1px solid var(--bd);margin:10px 0}
.mbtns{display:flex;gap:7px;margin-top:11px;flex-wrap:wrap}

/* SESSION CARDS */
.sess-card{background:var(--inp);border:1px solid var(--bd);border-radius:5px;
  padding:10px 12px;margin-bottom:6px;cursor:pointer;position:relative}
.sess-card.current{border-color:var(--acc);background:#140303}
.sess-card:active{background:var(--acc-ghost)}
.sess-name{font-size:1rem;font-weight:700;color:var(--txt)}
.sess-meta{font-size:0.77rem;color:var(--dim);margin-top:2px}
.sess-del{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--dim);
  font-size:1.08rem;cursor:pointer;padding:2px 4px;touch-action:manipulation}
.sess-del:active{color:var(--acc)}

/* TOAST */
#toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:var(--grn);
  color:#fff;padding:6px 18px;border-radius:20px;font-weight:700;font-size:0.92rem;
  z-index:700;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}

/* PRINT */
#pview{display:none}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;box-sizing:border-box}
  html,body{overflow:visible!important;height:auto!important;background:#fff!important;color:#111!important;font-size:9px;font-family:'Montserrat','Segoe UI',Arial,sans-serif;margin:0;padding:0}
  #shell{display:none!important}
  #pview{display:block!important;padding:18px 20px}
  /* Header */
  .ph1{display:flex;align-items:flex-start;justify-content:space-between;border-bottom:3px solid #cc1111;padding-bottom:8px;margin-bottom:10px}
  .ph1-left h1{font-size:16px;font-weight:900;letter-spacing:3px;color:#cc1111;text-transform:uppercase;margin:0}
  .ph1-left h2{font-size:10px;color:#555;margin:2px 0 0;font-weight:600;letter-spacing:.5px}
  .ph1-logo{max-height:44px;max-width:100px;object-fit:contain}
  /* Session info bar */
  .psess{display:grid;grid-template-columns:repeat(6,1fr);gap:4px 10px;margin-bottom:10px;border:1px solid #e0e0e0;border-radius:4px;padding:7px 10px;background:#fafafa}
  .psess div{}
  .psess label{font-size:7px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:1px}
  .psess span{font-size:10px;font-weight:700;color:#222}
  /* Section headers */
  .psect{font-size:7px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#cc1111;
    margin:10px 0 4px;padding:3px 6px;border-left:3px solid #cc1111;background:#fff8f8}
  /* Data table */

<script>
// ═══════════════════════════════════════════════════
//  CONSTANTS & CONFIG
// ═══════════════════════════════════════════════════
const SNAP=10, KEY='lmhud7';

const FRACS=['','1/16','1/8','3/16','1/4','5/16','3/8','7/16','1/2','9/16','5/8','11/16','3/4','13/16','7/8','15/16'];

function toFrac(v){
  if(v==null||v==='')return'';
  const w=Math.floor(v), f=Math.round((v-w)*16);
  if(f===0)return String(w);
  if(w===0)return FRACS[f]||'0';
  return w+' '+FRACS[f];
}
function toFracNoWhole(v){
  const f=Math.round(v*16);return FRACS[f]||'0';
}

// Parse time string to seconds
function parseTime(s){
  if(!s)return Infinity;
  s=s.trim();const p=s.split(':');
  return p.length===2?parseFloat(p[0])*60+parseFloat(p[1]):parseFloat(p[0]);
}
function formatTime(sec){
  if(!isFinite(sec))return'';
  if(sec>=60){const m=Math.floor(sec/60),s=(sec%60).toFixed(3).padStart(6,'0');return m+':'+s;}
  return sec.toFixed(3);
}

// Widget definitions
const STD=[
  {id:'run_info',    title:'Run Info',          fn:wRunInfo     },
  {id:'stagger',     title:'Stagger',           fn:wStagger     },
  {id:'cold_psi',    title:'Cold Tire PSI',     fn:wColdPSI     },
  {id:'hot_psi',     title:'Hot Tire PSI',      fn:wHotPSI      },
  {id:'builds',      title:'Builds (Calc)',     fn:wBuilds      },
  {id:'chassis',     title:'Chassis Setup',     fn:wChassis     },
  {id:'cross_member',title:'Cross Member',      fn:wCrossMember },
  {id:'temps',       title:'Temps',             fn:wTemps       },
  {id:'tire_temps',  title:'Tire Temps',        fn:wTireTemps   },
  {id:'brk_temps',   title:'Brake Temps',       fn:wBrkTemps    },
  {id:'shock_travel',title:'Shock Travel (in)', fn:wShockTravel },
  {id:'handling',    title:'Handling',          fn:wHandling    },
  {id:'notes',       title:'Notes',             fn:wNotes       },
];

// Default layout — all hidden (blank canvas). Positions used by resetLayout only.
const DEF={
  run_info:    {x:0,  y:0,  w:200,h:200,v:false,type:'run_info'    },
  stagger:     {x:210,y:0,  w:300,h:200,v:false,type:'stagger'     },
  cold_psi:    {x:520,y:0,  w:270,h:170,v:false,type:'cold_psi'    },
  hot_psi:     {x:520,y:180,w:270,h:170,v:false,type:'hot_psi'     },
  builds:      {x:520,y:360,w:270,h:110,v:false,type:'builds'      },
  chassis:     {x:0,  y:210,w:510,h:220,v:false,type:'chassis'     },
  cross_member:{x:0,  y:440,w:200,h:110,v:false,type:'cross_member'},
  temps:       {x:0,  y:440,w:210,h:160,v:false,type:'temps'       },
  tire_temps:  {x:220,y:440,w:400,h:230,v:false,type:'tire_temps'  },
  brk_temps:   {x:630,y:440,w:170,h:170,v:false,type:'brk_temps'   },
  shock_travel:{x:630,y:220,w:270,h:170,v:false,type:'shock_travel'},
  handling:    {x:0,  y:670,w:360,h:280,v:false,type:'handling'    },
  notes:       {x:0,  y:670,w:620,h:220,v:false,type:'notes'       },
};

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let layout=dc(DEF), sessions=[], curSess=0, curRun=0, editing=false, tbxN=0;

// ═══════════════════════════════════════════════════
//  DATA MODELS
// ═══════════════════════════════════════════════════
function blankRun(n){
  return{n,lapTimes:[],lapCount:0,tset:'',
    circ_lf:84,circ_rf:84,circ_lr:84,circ_rr:84,
    clf:12,crf:12,clr:12,crr:12,
    hlf:'',hrf:'',hlr:'',hrr:'',
    bar_load:200,bbias_f:'',bbias_r:'',
    xmem_l:0,xmem_r:0,tape:'',fuel:'',
    temps:[{name:'Water',val:100},{name:'Oil',val:100}],
    tlf:['','',''],trf:['','',''],tlr:['','',''],trr:['','',''],
    bklf:'',bkrf:'',bklr:'',bkrr:'',
    stlf:0,strf:0,stlr:0,strr:0,
    handling:{t12:{entry:{v:0,lt:'N'},landing:{v:0,lt:'N'},center:{v:0,lt:'N'},exit:{v:0,lt:'N'}},t34:{entry:{v:0,lt:'N'},landing:{v:0,lt:'N'},center:{v:0,lt:'N'},exit:{v:0,lt:'N'}}},
    notes_text:'',notes_canvas:'',
    changes_text:'',changes_canvas:'',
    notes_label:'Comments'};
}
function blankSession(n){
  return{id:'s'+Date.now(),name:'Session '+n,
    date:new Date().toISOString().slice(0,10),
    track:'',driver:'',chassis:'',air:'',trk:'',pnum:n,plen:'',
    runs:[blankRun(1)]};
}
function curSessObj(){return sessions[curSess]||sessions[0]}
function getRun(){return curSessObj().runs[curRun]||curSessObj().runs[0]}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
function init(){
  const raw=localStorage.getItem(KEY);
  if(raw){try{
    const d=JSON.parse(raw);
    if(d.layout) layout=Object.assign(dc(DEF),d.layout);
    if(d.sessions?.length) sessions=d.sessions;
    if(d.curSess!=null) curSess=d.curSess;
    if(d.curRun!=null) curRun=d.curRun;
    if(d.tbxN) tbxN=d.tbxN;
  }catch(e){}}
  if(!sessions.length){sessions=[blankSession(1)];curSess=0;curRun=0;}
  // Clamp indices
  curSess=Math.min(curSess,sessions.length-1);
  curRun=Math.min(curRun,(curSessObj().runs.length||1)-1);
  // Apply logo
  const logo=localStorage.getItem('lm_logo');
  if(logo) applyLogoData(logo);
  // Set default date on new session
  const sess=curSessObj();
  if(!sess.date) sess.date=new Date().toISOString().slice(0,10);
  updateSessBtn();
  renderSessStrip();
  renderStrip();
  renderAll();
  initFontSize();
  initColorPicker();
  startClock();
}
function dc(o){return JSON.parse(JSON.stringify(o))}

// ═══════════════════════════════════════════════════
//  SESSION MANAGEMENT
// ═══════════════════════════════════════════════════
function updateSessBtn(){
  const btn=document.getElementById('sess-btn');
  if(!btn)return;
  const s=curSessObj();
  btn.textContent=(s.name||'Session')+(s.track?' – '+s.track:'');
}

function openSessModal(){
  const list=document.getElementById('sess-list');
  list.innerHTML=sessions.map((s,i)=>`
    <div class="sess-card${i===curSess?' current':''}" onclick="loadSession(${i})">
      <div class="sess-name">${s.name||'Untitled'}</div>
      <div class="sess-meta">${s.track||'No track'} · ${s.date||''} · ${s.runs.length} run${s.runs.length!==1?'s':''}</div>
      <button class="sess-del" onclick="event.stopPropagation();delSession(${i})">x</button>
    </div>`).join('');
  // Pre-fill new session fields
  const next=sessions.length+1;
  document.getElementById('ns-name').value='Session '+next;

// ═══════════════════════════════════════════════════
//  RUN DATA COLLECT
// ═══════════════════════════════════════════════════
function saveCurrentRun(){
  const r=getRun();if(!r)return;
  r.tset=gv('r_ts');
  // Lap times collected live, skip here
  // Circumferences (fraction steppers)
  ['lf','rf','lr','rr'].forEach(c=>{
    const el=document.getElementById('r_circ_'+c);
    if(el) r['circ_'+c]=parseFloat(el.value)||84;
  });
  // Cold PSI
  ['clf','crf','clr','crr'].forEach(k=>{const el=document.getElementById('r_'+k);if(el)r[k]=parseFloat(el.value)||'';});
  // Hot PSI
  ['hlf','hrf','hlr','hrr'].forEach(k=>{const el=document.getElementById('r_'+k);if(el)r[k]=parseFloat(el.value)||'';});
  // Chassis
  r.bar_load=nv('r_barload');r.bbias_f=nv('r_bbiasf');r.bbias_r=nv('r_bbiasr');
  r.tape=nv('r_tape');r.fuel=nv('r_fuel');
  const lcEl=document.getElementById('r_lapcount');if(lcEl)r.lapCount=parseInt(lcEl.value)||0;
  // Cross member (fraction steppers)
  const xmL=document.getElementById('r_xmem_l');const xmR=document.getElementById('r_xmem_r');
  if(xmL)r.xmem_l=parseFloat(xmL.value)||0;
  if(xmR)r.xmem_r=parseFloat(xmR.value)||0;
  // Temps (collect each)
  r.temps.forEach((t,i)=>{const el=document.getElementById('r_temp_'+i);if(el)t.val=parseFloat(el.value)||t.val;});
  // Tire temps
  ['lf','rf','lr','rr'].forEach(c=>{
    r['t'+c]=[nv('r_tt'+c+'0'),nv('r_tt'+c+'1'),nv('r_tt'+c+'2')];
  });
  // Brake temps
  ['lf','rf','lr','rr'].forEach(c=>{r['bk'+c]=nv('r_bk'+c);});
  // Shock travel
  ['stlf','strf','stlr','strr'].forEach(k=>{const el=document.getElementById('r_'+k);if(el)r[k]=parseFloat(el.value)||0;});
  // Notes text — save to correct pad based on active label
  const nt=document.getElementById('notes-txt');
  if(nt){if(r.notes_label==='Changes')r.changes_text=nt.value;else r.notes_text=nt.value;}
  // Canvas saved live on stroke end
  // Tire boxes
  Object.keys(layout).filter(k=>layout[k].type==='tire_box').forEach(k=>{
    const el=document.getElementById('tb_v_'+k);
    if(el)getRun()['_'+k]=parseFloat(el.value)||'';
  });
}

function gv(id){const e=document.getElementById(id);return e?e.value:'';}
function nv(id){const e=document.getElementById(id);return e?(parseFloat(e.value)||''):'';}
function sv(id,v){const e=document.getElementById(id);if(e&&v!=null&&v!=='')e.value=v;}

function autosave(){

    saveCurrentRun();
    localStorage.setItem(KEY,JSON.stringify({layout,sessions,curSess,curRun,tbxN}));
  }catch(e){}
}
function saveAll(){autosave();toast('Saved');}
function hookInputs(){
  document.querySelectorAll('#dash input,#dash textarea').forEach(el=>{
    el.removeEventListener('blur',autosave);el.addEventListener('blur',autosave);
  });
}

// ═══════════════════════════════════════════════════
//  RUN STRIP
// ═══════════════════════════════════════════════════
function renderStrip(){
  const runs=curSessObj().runs;
  document.getElementById('rcards').innerHTML=runs.map((r,i)=>{
    const fastest=calcFastest(r.lapTimes);
    const lc=r.lapCount||r.lapTimes.length||0;
    return`<div class="rcard${i===curRun?' active':''}" onclick="switchRun(${i})">
      <div class="rn">Run ${r.n}</div>
      <div class="rt">${fastest||'--:--'}</div>
      <div class="rl">${lc?lc+' lap'+(lc!==1?'s':''):'No laps'}</div>
      <button class="rdel" onclick="event.stopPropagation();deleteRun(${i})" title="Delete run">&#10005;</button>
    </div>`;
  }).join('');
  setTimeout(()=>{document.querySelector('.rcard.active')?.scrollIntoView({behavior:'smooth',inline:'nearest',block:'nearest'});},50);
}

function calcFastest(times){
  if(!times||!times.length)return'';
  const best=Math.min(...times.map(parseTime));
  return isFinite(best)?formatTime(best):'';
}

function switchRun(i){saveCurrentRun();curRun=i;renderStrip();refreshRunWidgets();autosave();}
function addRun(){
  saveCurrentRun();
  const runs=curSessObj().runs;
  const n=Math.max(...runs.map(r=>r.n))+1;
  runs.push(blankRun(n));curRun=runs.length-1;
  renderStrip();refreshRunWidgets();autosave();toast('Run '+n+' added');
}

function renderAll(){
  document.querySelectorAll('#dash .widget').forEach(w=>w.remove());
  Object.keys(layout).forEach(id=>{
    const pos=layout[id];if(!pos.v)return;
    const def=getDef(id,pos.type);if(def)buildWidget(id,def,pos);
  });
  hookInputs();
  setTimeout(()=>{updateBuilds();updateStagger();},60);
}

function refreshRunWidgets(){
  Object.keys(layout).forEach(uid=>{
    const pos=layout[uid];if(!pos||!pos.v)return;
    const def=getDef(uid,pos.type);if(!def)return;
    const wb=document.querySelector(`[data-wid="${uid}"] .wb`);
    if(wb) wb.innerHTML=def.fn(getRun());
  });
  hookInputs();
  setTimeout(()=>{updateBuilds();updateStagger();},60);
}

function getDef(id,type){
  if(type==='tire_box'){const lp=layout[id];return{id,title:lp?.label||'PSI Box',fn:r=>tboxHTML(id,r)};}
  // For dynamic IDs like 'run_info_abc123', use type. For legacy exact IDs, use id.
  return STD.find(d=>d.id===(type||id))||STD.find(d=>d.id===id);
}

function buildWidget(id,def,pos){
  const dash=document.getElementById('dash');
  const w=document.createElement('div');
  w.className='widget'+(editing?' ':'');
  w.dataset.wid=id;
  w.style.cssText=`left:${pos.x}px;top:${pos.y}px;width:${pos.w}px;height:${pos.h}px;z-index:10`;
  const displayTitle=pos.customTitle||def.title;
  const wbCls='wb'+(pos.type?' wb-'+pos.type:'');
  w.innerHTML=`
    <div class="wh" data-wid="${id}">
      <span class="wt">${displayTitle}</span>
      <button class="wbtn" onclick="openSettings('${id}')" title="Settings">&#9881;</button>
      <button class="wbtn wcls" onclick="closeW('${id}')" title="Hide">&#10005;</button>
    </div>
    <div class="${wbCls}">${def.fn(getRun())}</div>
    <div class="wr" data-wid="${id}"></div>`;
  dash.appendChild(w);
  bindDrag(w);bindResize(w.querySelector('.wr'));
}

// ═══════════════════════════════════════════════════
//  DRAG & RESIZE
// ═══════════════════════════════════════════════════
function bindDrag(widget){
  const hdr=widget.querySelector('.wh');
  let sx,sy,ox,oy,drag=false;
  const ghost=document.getElementById('ghost');
  function start(cx,cy){
    if(!editing)return;drag=true;sx=cx;sy=cy;
    ox=parseInt(widget.style.left)||0;oy=parseInt(widget.style.top)||0;
    widget.classList.add('dragging');widget.style.zIndex=500;
    ghost.style.cssText=`display:block;left:${ox}px;top:${oy}px;width:${widget.offsetWidth}px;height:${widget.offsetHeight}px`;
  }
  function move(cx,cy){
    if(!drag)return;
    const dash=document.getElementById('dash');
    const maxX=Math.max(0,dash.offsetWidth-widget.offsetWidth);
    const maxY=Math.max(0,dash.offsetHeight-widget.offsetHeight);
    const nx=Math.max(0,Math.min(maxX,sn(ox+(cx-sx))));
    const ny=Math.max(0,Math.min(maxY,sn(oy+(cy-sy))));
    widget.style.left=nx+'px';widget.style.top=ny+'px';
    ghost.style.left=nx+'px';ghost.style.top=ny+'px';
  }
  function end(){
    if(!drag)return;drag=false;
    widget.classList.remove('dragging');widget.style.zIndex=10;
    ghost.style.display='none';
    const id=widget.dataset.wid;
    if(layout[id]){layout[id].x=parseInt(widget.style.left)||0;layout[id].y=parseInt(widget.style.top)||0;}
  }
  hdr.addEventListener('mousedown',e=>{if(e.target.classList.contains('wbtn'))return;start(e.clientX,e.clientY);e.preventDefault();});
  document.addEventListener('mousemove',e=>move(e.clientX,e.clientY));
  document.addEventListener('mouseup',end);
  hdr.addEventListener('touchstart',e=>{if(e.target.classList.contains('wbtn'))return;if(!editing)return;const t=e.touches[0];start(t.clientX,t.clientY);},{passive:true});
  hdr.addEventListener('touchmove',e=>{if(!drag)return;e.preventDefault();const t=e.touches[0];move(t.clientX,t.clientY);},{passive:false});
  hdr.addEventListener('touchend',end);
}

function bindResize(handle){
  if(!handle)return;
  const widget=handle.closest('.widget');
  let sx,sy,ow,oh,resz=false;
  function start(cx,cy){if(!editing)return;resz=true;sx=cx;sy=cy;ow=widget.offsetWidth;oh=widget.offsetHeight;}
  function move(cx,cy){
    if(!resz)return;
    const dash=document.getElementById('dash');
    const maxW=dash.offsetWidth-(parseInt(widget.style.left)||0);
    const maxH=dash.offsetHeight-(parseInt(widget.style.top)||0);
    widget.style.width=Math.max(140,Math.min(maxW,sn(ow+(cx-sx))))+'px';
    widget.style.height=Math.max(80,Math.min(maxH,sn(oh+(cy-sy))))+'px';
  }
  function end(){if(!resz)return;resz=false;const id=widget.dataset.wid;if(layout[id]){layout[id].w=widget.offsetWidth;layout[id].h=widget.offsetHeight;}}
  handle.addEventListener('mousedown',e=>{start(e.clientX,e.clientY);e.preventDefault();e.stopPropagation();});
  document.addEventListener('mousemove',e=>move(e.clientX,e.clientY));
  document.addEventListener('mouseup',end);
  handle.addEventListener('touchstart',e=>{if(!editing)return;const t=e.touches[0];start(t.clientX,t.clientY);e.stopPropagation();},{passive:true});
  handle.addEventListener('touchmove',e=>{if(!resz)return;e.preventDefault();const t=e.touches[0];move(t.clientX,t.clientY);},{passive:false});
  handle.addEventListener('touchend',end);
}
function sn(v){return Math.round(v/SNAP)*SNAP;}
function resetLayout(){
  if(!confirm('Reset to default layout? Data kept.'))return;
  const boxes={};Object.keys(layout).filter(k=>layout[k].type==='tire_box').forEach(k=>boxes[k]=layout[k]);
  layout=Object.assign(dc(DEF),boxes);renderAll();autosave();toast('Layout reset');
}

// ═══════════════════════════════════════════════════
//  STEPPER (regular numeric)
// ═══════════════════════════════════════════════════
let stmr=null;
function startStep(id,d,mn,mx){stopStep();doStep(id,d,mn,mx);stmr=setInterval(()=>doStep(id,d,mn,mx),110);}
function stopStep(){if(stmr){clearInterval(stmr);stmr=null;}autosave();updateBuilds();}
function doStep(id,d,mn,mx){
  const el=document.getElementById(id);if(!el)return;
  let v=parseFloat(el.value)||0;
  v=Math.round((v+d)*10000)/10000;
  if(mn!=null)v=Math.max(mn,v);
  if(mx!=null)v=Math.min(mx,v);
  el.value=v;
}

// Fraction stepper
let fstmr=null;
function startFStep(id,d,mn,mx){stopFStep();doFStep(id,d,mn,mx);fstmr=setInterval(()=>doFStep(id,d,mn,mx),120);}
function stopFStep(){if(fstmr){clearInterval(fstmr);fstmr=null;}autosave();updateStagger();updateBuilds();}
function doFStep(id,d,mn,mx){
  const el=document.getElementById(id);if(!el)return;
  const step=d; // d is +/- 0.0625 (1/16)
  let v=parseFloat(el.value)||(mn||0);
  v=Math.round((v+step)*160)/160; // keep in 1/16 steps
  if(mn!=null)v=Math.max(mn,v);
  if(mx!=null)v=Math.min(mx,v);
  el.value=v;
  const disp=document.getElementById('fd_'+id);
  if(disp) disp.textContent=mn>=1?toFrac(v):toFracNoWhole(v);
}

// ═══════════════════════════════════════════════════
//  FRACTION STEPPER HTML
// ═══════════════════════════════════════════════════
// mn/mx: numeric range, isWhole: show whole number in fraction
function fracSp(id,val,mn,mx,showWhole=true){
  const d=0.0625;
  const disp=showWhole?toFrac(val||mn):toFracNoWhole(val||0);
  return`<div class="fsp">
    <button class="spb" onpointerdown="startFStep('${id}',-${d},${mn},${mx})" onpointerup="stopFStep()" onpointercancel="stopFStep()">-</button>
    <div class="fsp-disp" id="fd_${id}">${disp}</div>
    <input type="hidden" id="${id}" value="${val||mn}">
    <button class="spb" onpointerdown="startFStep('${id}',${d},${mn},${mx})" onpointerup="stopFStep()" onpointercancel="stopFStep()">+</button>
  </div>`;
}

// ═══════════════════════════════════════════════════
//  WIDGET HTML HELPERS
// ═══════════════════════════════════════════════════
function sp(id,val,step,mn,mx,ph=''){
  const mnA=mn!=null?`,${mn}`:',null';const mxA=mx!=null?`,${mx}`:',null';
  return`<div class="sp">
    <button class="spb" onpointerdown="startStep('${id}',-${step}${mnA}${mxA})" onpointerup="stopStep()" onpointercancel="stopStep()">-</button>
    <input type="number" id="${id}" value="${val??''}" step="${step}" placeholder="${ph}">
    <button class="spb" onpointerdown="startStep('${id}',${step}${mnA}${mxA})" onpointerup="stopStep()" onpointercancel="stopStep()">+</button>
  </div>`;
}
function fld(l,h){return`<div class="field"><label>${l}</label>${h}</div>`;}
function txt(l,id,v,ph=''){return fld(l,`<input type="text" id="${id}" value="${v??''}" placeholder="${ph}">`);}
function spf(l,id,v,s,mn,mx,ph=''){return fld(l,sp(id,v,s,mn,mx,ph));}

// ═══════════════════════════════════════════════════
//  BUILDS CALCULATION
// ═══════════════════════════════════════════════════
function updateBuilds(){
  ['lf','rf','lr','rr'].forEach(c=>{
    const cold=parseFloat(document.getElementById('r_c'+c)?.value)||parseFloat(getRun()['c'+c])||0;
    const hot =parseFloat(document.getElementById('r_h'+c)?.value)||parseFloat(getRun()['h'+c])||0;
    const build=hot-cold;
    const el=document.getElementById('bld_'+c);
    if(el){
      el.textContent=(build>=0?'+':'')+build.toFixed(1);
      el.className='build-val '+(build>0?'pos':build<0?'neg':'zero');
    }
  });
}

// ═══════════════════════════════════════════════════
//  STAGGER CALCULATION
// ═══════════════════════════════════════════════════
function updateStagger(){
  const r=getRun();
  const lf=parseFloat(document.getElementById('r_circ_lf')?.value)||r.circ_lf||84;
  const rf=parseFloat(document.getElementById('r_circ_rf')?.value)||r.circ_rf||84;
  const lr=parseFloat(document.getElementById('r_circ_lr')?.value)||r.circ_lr||84;
  const rr=parseFloat(document.getElementById('r_circ_rr')?.value)||r.circ_rr||84;
  const fs=Math.round((rf-lf)*160)/160;
  const rs=Math.round((rr-lr)*160)/160;
  const fsEl=document.getElementById('stag_f');const rsEl=document.getElementById('stag_r');
  if(fsEl)fsEl.textContent=toFrac(Math.abs(fs))+(fs<0?' (-)':'');
  if(rsEl)rsEl.textContent=toFrac(Math.abs(rs))+(rs<0?' (-)':'');
}

function wHandling(r){
  const h=r.handling||{
    t12:{entry:{v:0,lt:'N'},landing:{v:0,lt:'N'},center:{v:0,lt:'N'},exit:{v:0,lt:'N'}},
    t34:{entry:{v:0,lt:'N'},landing:{v:0,lt:'N'},center:{v:0,lt:'N'},exit:{v:0,lt:'N'}}
  };
  // Migrate old format if needed
  if(!h.t12){const old=h;h.t12={entry:old.entry||{v:0,lt:'N'},landing:old.landing||{v:0,lt:'N'},center:old.center||{v:0,lt:'N'},exit:old.exit||{v:0,lt:'N'}};h.t34={entry:{v:0,lt:'N'},landing:{v:0,lt:'N'},center:{v:0,lt:'N'},exit:{v:0,lt:'N'}};}
  function box(turn,key,label){
    const grp=h[turn]||{};
    const d=grp[key]||{v:0,lt:'N'};
    const zc=d.lt==='L'?'lt-loose':d.lt==='T'?'lt-tight':'';
    return`<div class="tc hs-tc ${zc}" id="hs_${turn}_${key}">
      <div class="cl hs-zn">${label}</div>
      <div class="hs-num" id="hs_v_${turn}_${key}">${d.v||0}</div>
      <div class="hs-adj">
        <button onclick="adjHandling('${turn}','${key}',-1)">-</button>
        <button onclick="adjHandling('${turn}','${key}',1)">+</button>
      </div>
      <div class="hs-lt-row">
        <button class="hs-lt${d.lt==='L'?' al':''}" onclick="setHandlingLT('${turn}','${key}','L')">L</button>
        <button class="hs-lt${d.lt==='N'?' an':''}" onclick="setHandlingLT('${turn}','${key}','N')">N</button>
        <button class="hs-lt${d.lt==='T'?' at':''}" onclick="setHandlingLT('${turn}','${key}','T')">T</button>
      </div>
    </div>`;
  }
  function turnRow(turn,label){
    return`<div style="margin-bottom:5px">
      <div class="sec" style="margin-bottom:4px">${label}</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px">
        ${box(turn,'entry','Entry')}
        ${box(turn,'landing','Landing')}
        ${box(turn,'center','Center')}
        ${box(turn,'exit','Exit')}
      </div>
    </div>`;
  }
  return`${turnRow('t12','Turns 1 &amp; 2')}${turnRow('t34','Turns 3 &amp; 4')}`;
}

function adjHandling(turn,key,d){
  const r=getRun();
  if(!r.handling||!r.handling.t12)r.handling={t12:{entry:{v:0,lt:'N'},landing:{v:0,lt:'N'},center:{v:0,lt:'N'},exit:{v:0,lt:'N'}},t34:{entry:{v:0,lt:'N'},landing:{v:0,lt:'N'},center:{v:0,lt:'N'},exit:{v:0,lt:'N'}}};
  if(!r.handling[turn])r.handling[turn]={entry:{v:0,lt:'N'},landing:{v:0,lt:'N'},center:{v:0,lt:'N'},exit:{v:0,lt:'N'}};
  const sec=r.handling[turn][key]||{v:0,lt:'N'};
  sec.v=Math.max(-20,Math.min(20,(sec.v||0)+d));
  r.handling[turn][key]=sec;
  const el=document.getElementById('hs_v_'+turn+'_'+key);if(el)el.textContent=sec.v;
  autosave();
}

function setHandlingLT(turn,key,lt){
  const r=getRun();
  if(!r.handling||!r.handling.t12)r.handling={t12:{entry:{v:0,lt:'N'},landing:{v:0,lt:'N'},center:{v:0,lt:'N'},exit:{v:0,lt:'N'}},t34:{entry:{v:0,lt:'N'},landing:{v:0,lt:'N'},center:{v:0,lt:'N'},exit:{v:0,lt:'N'}}};
  if(!r.handling[turn])r.handling[turn]={entry:{v:0,lt:'N'},landing:{v:0,lt:'N'},center:{v:0,lt:'N'},exit:{v:0,lt:'N'}};
  const sec=r.handling[turn][key]||{v:0,lt:'N'};
  sec.lt=lt;r.handling[turn][key]=sec;
  Object.keys(layout).filter(k=>layout[k].type==='handling'&&layout[k].v).forEach(k=>{
    const wb=document.querySelector(`[data-wid="${k}"] .wb`);
    if(wb)wb.innerHTML=wHandling(getRun());
  });
  autosave();
}

// Normalize lap time input: "14232" → "14.232", "1:14232" → "1:14.232"
function normalizeLapTime(v){
  v=v.trim();
  // Already has decimal: keep as-is
  if(v.includes('.'))return v;
  // MM:SSMMM format (e.g. "1:14232") → "1:14.232"
  const colonParts=v.split(':');
  if(colonParts.length===2){
    const s=colonParts[1];
    if(s.length>3)return colonParts[0]+':'+(s.slice(0,-3)+'.'+s.slice(-3));
    return v;
  }
  // Pure digits ≥4 chars: last 3 = thousandths, rest = seconds
  if(/^\d+$/.test(v)&&v.length>=4)return v.slice(0,-3)+'.'+v.slice(-3);
  return v;
}

function addWidgetInstance(type){
  const def=STD.find(d=>d.id===type);if(!def)return;
  const uid=type+'_'+Date.now().toString(36);
  const tmpl=DEF[type]||{w:240,h:200};
  // Offset slightly so stacked widgets are visible
  const existing=Object.keys(layout).filter(k=>layout[k].type===type).length;
  const ox=20+existing*14, oy=20+existing*14;
  layout[uid]={x:ox,y:oy,w:tmpl.w,h:tmpl.h,v:true,type};
  buildWidget(uid,def,layout[uid]);
  hookInputs();
  setTimeout(()=>{updateBuilds();updateStagger();},60);
  autosave();closeM('m-pick');toast(def.title+' added');
}

    ['Hot RF',     runs.map(r=>r.hrf||'-')],
    ['Hot LR',     runs.map(r=>r.hlr||'-')],

// ═══════════════════════════════════════════════════
//  LIVE CLOCK + DAY SCHEDULE
// ═══════════════════════════════════════════════════
const SCHED_KEY='lm_sched';
let clockInterval=null;

function getSchedule(){
  try{const d=JSON.parse(localStorage.getItem(SCHED_KEY)||'[]');
    return d.sort((a,b)=>a.start.localeCompare(b.start));}catch(e){return[];}
}
function saveSchedule(arr){localStorage.setItem(SCHED_KEY,JSON.stringify(arr));}

function startClock(){
  if(clockInterval)clearInterval(clockInterval);
  clockInterval=setInterval(tickClock,1000);
  tickClock();
}

function tickClock(){
  const now=new Date();
  let h=now.getHours(), ampm=h>=12?'PM':'AM';
  h=h%12;if(h===0)h=12;
  const m=now.getMinutes().toString().padStart(2,'0');
  const s=now.getSeconds().toString().padStart(2,'0');
  const tzStr=now.toLocaleTimeString('en-US',{timeZoneName:'short'});
  const tzAbbr=tzStr.split(' ').pop()||'';
  const clk=document.getElementById('live-clock');
  if(clk)clk.textContent=h+':'+m+':'+s+' '+ampm+' '+tzAbbr;

  const cdisp=document.getElementById('countdown-display');
  const csep=document.getElementById('clock-sep');
  if(!cdisp)return;
  const sched=getSchedule();
  if(!sched.length){cdisp.style.display='none';if(csep)csep.style.display='none';return;}

  // Build today's ms timestamps for each item
  const base=new Date();base.setHours(0,0,0,0);
  const baseMs=base.getTime();
  const nowMs=Date.now();
  let status='',cls='';

  for(const item of sched){
    const[sh,sm]=item.start.split(':').map(Number);
    const startMs=baseMs+(sh*60+sm)*60000;
    const endMs=startMs+(item.dur||30)*60000;
    if(nowMs>=startMs&&nowMs<endMs){
      const rem=Math.ceil((endMs-nowMs)/1000);
      const rm=Math.floor(rem/60),rs=rem%60;
      status=item.name+' '+rm+':'+rs.toString().padStart(2,'0');
      const msLeft=endMs-nowMs;
      cls=msLeft<300000?'cdurgent':msLeft<600000?'cdwarn':'';
      break;
    }
    if(nowMs<startMs){
      const rem=Math.ceil((startMs-nowMs)/1000);
      const rh=Math.floor(rem/3600),rm=Math.floor((rem%3600)/60),rs=rem%60;
      const ts=rh>0?rh+'h '+rm.toString().padStart(2,'0')+'m':rm.toString().padStart(2,'0')+'m '+rs.toString().padStart(2,'0')+'s';
      status=item.name+' in '+ts;
      const msUntil=startMs-nowMs;
      cls=msUntil<300000?'cdurgent':msUntil<600000?'cdwarn':'';
      break;
    }
  }
  if(!status){const last=sched[sched.length-1];if(last){const[sh,sm]=last.start.split(':').map(Number);const endMs=baseMs+(sh*60+sm)*60000+(last.dur||30)*60000;if(nowMs>=endMs){status='Done';cls='';}}}
  if(status){
    cdisp.style.display='';if(csep)csep.style.display='';
  } else {
    cdisp.style.display='none';if(csep)csep.style.display='none';
  }
  cdisp.textContent=status;cdisp.className=cls;
}

// ─── Schedule Modal ───
function openM_schedule(){
  renderSchedList();
  // Pre-fill start time with current time rounded to next 30min
  const now=new Date();let h=now.getHours(),m=now.getMinutes();
  m=m<30?30:0;if(m===0)h=(h+1)%24;
  document.getElementById('si-start').value=h.toString().padStart(2,'0')+':'+m.toString().padStart(2,'0');
  document.getElementById('si-dur').value='30';
  document.getElementById('si-name').value='';
}

function renderSchedList(){
  const sched=getSchedule();
  const now=new Date();
  const base=new Date();base.setHours(0,0,0,0);
  const baseMs=base.getTime();
  const nowMs=Date.now();
  const target=document.getElementById('sched-list-inline')||document.getElementById('sched-list');
  if(!target)return;
  target.innerHTML=sched.length===0
    ?'<div style="color:var(--dim);font-size:11px;padding:8px 0">No sessions scheduled yet</div>'
    :sched.map((item,i)=>{
      const[sh,sm]=item.start.split(':').map(Number);
      const startMs=baseMs+(sh*60+sm)*60000;
      const endMs=startMs+(item.dur||30)*60000;
      const active=nowMs>=startMs&&nowMs<endMs;
      const isNext=!active&&nowMs<startMs&&(i===0||nowMs>=(baseMs+(sched[i-1].start.split(':').reduce((a,v,j)=>(j===0?a+parseInt(v)*60:a+parseInt(v)),0))*60000+(sched[i-1].dur||30)*60000));
      // Format start time 12h
      let dh=sh%12;if(dh===0)dh=12;const ampm=sh>=12?'PM':'AM';
      const t12=dh+':'+sm.toString().padStart(2,'0')+' '+ampm;
      return`<div class="sched-item${active?' active':isNext?' next':''}">
        <div style="flex:1">
          <div class="si-name">${item.name}</div>
          <div class="si-meta">${t12} &middot; ${item.dur||30} min${active?' \u25B6 IN PROGRESS':isNext?' \u2192 UP NEXT':''}</div>
        </div>
        <button class="si-del" onclick="deleteSchedItem(${i})">&#10005;</button>
      </div>`;
    }).join('');
}

function addSchedItem(){
  const name=document.getElementById('si-name').value.trim();
  const start=document.getElementById('si-start').value;
  const dur=parseInt(document.getElementById('si-dur').value)||30;
  if(!name){toast('Enter a session name');return;}
  if(!start){toast('Set a start time');return;}
  const sched=getSchedule();
  sched.push({id:'s'+Date.now(),name,start,dur});
  saveSchedule(sched);
  renderSchedList();
  document.getElementById('si-name').value='';
  tickClock();
  toast(name+' added to schedule');
}

function deleteSchedItem(i){
  const sched=getSchedule();
  sched.splice(i,1);
  saveSchedule(sched);
  renderSchedList();
  tickClock();
}

function clearSchedule(){
  if(!confirm('Clear entire day schedule?'))return;
  saveSchedule([]);renderSchedList();tickClock();toast('Schedule cleared');
}

//  ACCENT COLOR
// ═══════════════════════════════════════════════════
const COLOR_PRESETS=[
  {name:'Racing Red',  hex:'#cc1111'},
  {name:'Hot Orange',  hex:'#cc5500'},
  {name:'Amber',       hex:'#cc8800'},
  {name:'Lime',        hex:'#44aa00'},
  {name:'Teal',        hex:'#008888'},
  {name:'Blue',        hex:'#1155cc'},
  {name:'Purple',      hex:'#7711cc'},
  {name:'Pink',        hex:'#cc1177'},
];

function setAccentColor(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  // Lighter highlight (+35%)
  const lr=Math.min(255,Math.round(r*1.35)),lg=Math.min(255,Math.round(g*1.35)),lb=Math.min(255,Math.round(b*1.35));
  const accH='#'+lr.toString(16).padStart(2,'0')+lg.toString(16).padStart(2,'0')+lb.toString(16).padStart(2,'0');
  // Derived tint vars — dark blends of accent on black
  const mix=(pct)=>`rgb(${Math.round(r*pct)},${Math.round(g*pct)},${Math.round(b*pct)})`;
  const root=document.documentElement;
  root.style.setProperty('--acc',hex);
  root.style.setProperty('--accH',accH);
  root.style.setProperty('--acc-tint',   mix(0.15));   // stepper btn bg
  root.style.setProperty('--acc-tint2',  mix(0.22));   // stepper btn hover bg
  root.style.setProperty('--acc-dim',    mix(0.09));   // focus input bg
  root.style.setProperty('--acc-ghost',  mix(0.05));   // active card bg
  root.style.setProperty('--acc-faint',  `rgba(${r},${g},${b},0.09)`);  // panel tints
  root.style.setProperty('--acc-faint2', `rgba(${r},${g},${b},0.4)`);   // edit border
  localStorage.setItem('lm_color',hex);
  document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('active',s.dataset.hex===hex));
  document.getElementById('color-hex').textContent=hex;
  document.getElementById('color-pick').value=hex;
}

function applyCustomColor(){
  const hex=document.getElementById('color-pick').value;
  setAccentColor(hex);toast('Color updated');
}

function initColorPicker(){
  const row=document.getElementById('swatches');
  const cur=localStorage.getItem('lm_color')||'#cc1111';
  row.innerHTML=COLOR_PRESETS.map(c=>`
    <div class="swatch${c.hex===cur?' active':''}" data-hex="${c.hex}" style="background:${c.hex}"
      title="${c.name}" onclick="setAccentColor('${c.hex}');toast('${c.name}')"></div>`).join('');
  document.getElementById('color-pick').value=cur;
  document.getElementById('color-hex').textContent=cur;
  document.getElementById('color-pick').addEventListener('input',e=>{
    document.getElementById('color-hex').textContent=e.target.value;
  });
  // Apply saved color on load
  if(cur!=='#cc1111') setAccentColor(cur);
}

function closeSettingsPanel(){

function toggleSettingsPanel(){

function spTab(name){
  // Activate tab button
  document.querySelectorAll('.sp-tab').forEach(b=>b.classList.remove('active'));
  const map={schedule:'sched-tab-btn'};
  // find button by iterating tabs
  document.querySelectorAll('.sp-tab').forEach(b=>{
    const pane=b.getAttribute('onclick').match(/spTab\('(\w+)'\)/);
    if(pane&&pane[1]===name) b.classList.add('active');
  });
  // Show correct pane
  ['schedule','layout','color','data','display'].forEach(n=>{
    const el=document.getElementById('sp-'+n);
    if(el) el.style.display=n===name?'':'none';
  });
  // Refresh schedule list when switching to it
  if(name==='schedule') renderSchedList();
}

// ═══════════════════════════════════════════════════
//  FONT SIZE
// ═══════════════════════════════════════════════════
const FZ_KEY='lm_fz';
const FZ_MIN=10, FZ_MAX=20, FZ_DEF=13;

function applyFontSize(px){
  document.documentElement.style.fontSize=px+'px';
  localStorage.setItem(FZ_KEY,px);

  const disp=document.getElementById('fz-display');
  const dec=document.getElementById('fz-dec');
  const inc=document.getElementById('fz-inc');
  if(!disp||!dec||!inc) return;

  disp.textContent=px+'px';

  // Colour scale: dim at limits, accent in middle, bright accent when pushed high
  const ratio=(px-FZ_MIN)/(FZ_MAX-FZ_MIN); // 0=smallest … 1=largest
  // − button: dims when at min, bright when size is large (easy to see you need to go back down)
  if(px<=FZ_MIN){
    dec.style.color='var(--dim)'; dec.style.background='var(--inp)';
  } else if(ratio>0.5){
    dec.style.color='var(--accH)'; dec.style.background='#3a0404';
  } else {
    dec.style.color='var(--acc)'; dec.style.background='#2a0404';
  }
  // + button: dims when at max, bright when size is small (easy to see you need to go bigger)
  if(px>=FZ_MAX){
    inc.style.color='var(--dim)'; inc.style.background='var(--inp)';
  } else if(ratio<0.5){
    inc.style.color='var(--accH)'; inc.style.background='#3a0404';
  } else {
    inc.style.color='var(--acc)'; inc.style.background='#2a0404';
  }
  // Display value: accent when away from default, dim when at default
  disp.style.color=px===FZ_DEF?'var(--dim)':'var(--txt)';
}

function adjustFontSize(delta){
  const cur=parseInt(localStorage.getItem(FZ_KEY)||FZ_DEF);
  const next=Math.min(FZ_MAX,Math.max(FZ_MIN,cur+delta));
  applyFontSize(next);
}

function resetFontSize(){
  applyFontSize(FZ_DEF);
}

function initFontSize(){
  const saved=parseInt(localStorage.getItem(FZ_KEY)||FZ_DEF);
  applyFontSize(saved);
}
